name: Governance Drift Check

on:
  pull_request:
    paths:
      - ".github/workflows/governance-drift.yml"
      - "README.md"
      - "governance.config.yaml"
      - "workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/governance-drift.yml"
      - "README.md"
      - "governance.config.yaml"
      - "workflows/**"

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install openclaw-governance
        run: python -m pip install "openclaw-governance @ git+https://github.com/pawlsclick/openclaw-governance@v0.5.5"
      - name: Check README workflow summary
        run: openclaw-gov regen --check --root .
      - name: Check workflow registry
        run: openclaw-gov check --root .
      - name: Staged discover must not mutate registry
        run: |
          openclaw-gov discover --staged --root .
          git diff --exit-code workflows/registry.yaml
