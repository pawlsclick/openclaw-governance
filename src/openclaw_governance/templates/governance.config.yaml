# openclaw-gov instance configuration
openclaw_home: "OPENCLAW_HOME_PLACEHOLDER"
governance_root: "GOVERNANCE_ROOT_PLACEHOLDER"

# GitHub (or other) remote where you push this governance root
# remote:
#   url: "https://github.com/you/your-governance-repo.git"
#   default_branch: main

accountable_humans:
  - Operator

agents:
  broadcast_excluded: []
  # Stanza injection allowlist. Omit key = all agents; [] = none.
  # inject_included:
  #   - main

discovery:
  scan_git_repos: true
  scan_script_globs:
    - "scripts/**/*.py"
    - "automation/**/*.py"

require_readme_markers: true
finance_agent_owner_check: false

# Optional: extend RACI domain prefix rules
# domain_prefix_rules:
#   - prefix: finance.
#     domain: finance_trading
