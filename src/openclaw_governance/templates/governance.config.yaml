# openclaw-gov instance configuration
openclaw_home: "OPENCLAW_HOME_PLACEHOLDER"
governance_root: "GOVERNANCE_ROOT_PLACEHOLDER"

# GitHub (or other) remote where you push this governance root
# remote:
#   url: "https://github.com/you/your-governance-repo.git"
#   default_branch: main
#
# Git workflow for agents updating governance docs:
#   openclaw-gov ship start   # branch from main BEFORE discover --write / regen --write
#   ... make changes ...
#   openclaw-gov ship commit  # validate, commit, ask before push/PR

accountable_humans:
  - Operator

agents:
  broadcast_excluded: []
  # Stanza injection allowlist. Omit key = all agents; [] = none.
  # inject_included:
  #   - main

discovery:
  scan_git_repos: true
  scan_workspace_runbooks: true
  scan_workspace_runbook_glob: "**/*runbook*.md"
  # Per-agent timeout for `openclaw cron list` (seconds, default 45, max 120)
  cron_timeout_seconds: 45
  scan_script_globs:
    - "scripts/**/*.py"
    - "automation/**/*.py"

require_readme_markers: true
finance_agent_owner_check: false

# Optional: override automatic RACI domain prefix rules (replaces built-in defaults).
# By default, discover --write creates one ops domain per discovered agent
# (agent id with hyphens -> underscores + "_ops", e.g. billing-bot -> billing_bot_ops)
# and maps workflows "{agent_id}.*" to that domain. OpenClaw's usual "main" agent
# also keeps governance_registry / personal_ops for shared templates.
# domain_prefix_rules:
#   - prefix: finance.
#     domain: finance_trading
